<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow | シンプル時間記録タイマー</title>
  <!-- Google Fonts: Outfit & Noto Sans JP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="light-mode">
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">⏱️</span>
        <h1>FocusFlow</h1>
      </div>
    </header>

    <!-- Main Content Grid -->
    <main class="app-grid">
      <!-- Left side: Timer and Controls -->
      <section class="timer-section glass-card">
        <div class="timer-display-container">
          <!-- Circular Progress SVG -->
          <svg class="progress-ring" width="280" height="280">
            <circle class="progress-ring-bg" stroke="#f1f5f9" stroke-width="6" fill="transparent" r="130" cx="140" cy="140"/>
            <circle class="progress-ring-bar" stroke="var(--primary-color)" stroke-width="6" fill="transparent" r="130" cx="140" cy="140"/>
          </svg>
          
          <div class="timer-time" id="timer-time">00:00</div>
          <div class="timer-status" id="timer-status">計測を開始してください</div>
        </div>

        <div class="timer-controls">
          <button id="btn-start" class="btn btn-primary btn-large">
            <i data-lucide="play"></i> スタート
          </button>
          <button id="btn-pause" class="btn btn-secondary btn-large hidden">
            <i data-lucide="pause"></i> 一時停止
          </button>
          <button id="btn-reset" class="btn btn-outline" title="現在の計測をリセット">
            <i data-lucide="rotate-ccw"></i>
          </button>
        </div>

        <div class="current-task-display" id="current-task-display">
          <p class="task-label">選択中のタスク</p>
          <p class="task-name" id="active-task-name">タスクが選択されていません</p>
        </div>
      </section>

      <!-- Right side: Tasks & Stats -->
      <div class="sidebar-section">
        <!-- Tasks Card -->
        <section class="tasks-card glass-card">
          <h2><i data-lucide="check-square"></i> タスク一覧</h2>
          
          <form id="task-form" class="task-form">
            <input type="text" id="task-input" placeholder="新しいタスクを追加..." required autocomplete="off">
            <button type="submit" class="btn-icon-submit" aria-label="タスク追加">
              <i data-lucide="plus"></i>
            </button>
          </form>

          <div class="task-list-container">
            <ul id="task-list" class="task-list">
              <!-- Dynamically populated -->
            </ul>
          </div>
        </section>

        <!-- Stats Card -->
        <section class="stats-card glass-card">
          <h2><i data-lucide="bar-chart-2"></i> 今日の実績</h2>
          
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-num" id="stat-minutes">0秒</span>
              <span class="stat-label">今日の総記録時間</span>
            </div>
            <div class="stat-item">
              <span class="stat-num" id="stat-sessions">0</span>
              <span class="stat-label">完了したタスク</span>
            </div>
          </div>

          <div class="stats-chart-container">
            <p class="chart-title">過去7日間の作業時間 (分)</p>
            <div class="bar-chart" id="weekly-chart">
              <!-- Dynamically populated bars -->
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
